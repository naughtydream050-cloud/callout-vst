name: Post to Instagram

on:
  schedule:
    # 毎週日曜 22:00 JST = 13:00 UTC
    - cron: "0 13 * * 0"
  workflow_dispatch:
    inputs:
      debug:
        description: 'DEBUG mode (投稿せず商品確認のみ)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run BASE → Instagram sync
        env:
          BASE_CLIENT_ID:     ${{ secrets.BASE_CLIENT_ID }}
          BASS_CLIENT_ID:     ${{ secrets.BASS_CLIENT_ID }}
          BASE_CLIENT_SECRET: ${{ secrets.BASE_CLIENT_SECRET }}
          BASE_REFRESH_TOKEN: ${{ secrets.BASE_REFRESH_TOKEN }}
          BASE_ACCESS_TOKEN:  ${{ secrets.BASE_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN:    ${{ secrets.INSTAGRAM_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
          SHOP_ID:            ${{ secrets.SHOP_ID }}
          DEBUG:              ${{ github.event.inputs.debug || secrets.DEBUG || 'false' }}
        run: python insta_base_sync.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Instagram投稿失敗::ログを確認してください。BASE API 401 の場合はトークンの更新が必要です。"
